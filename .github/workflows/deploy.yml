name: Deploy CV to Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Pandoc and TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex texlive-latex-base texlive-fonts-recommended texlive-fonts-extra texlive-latex-extra fonts-dejavu-core

      - name: Create build directory
        run: mkdir -p public

      - name: Generate PDF
        run: |
          GEN_DATE=$(date +"%Y-%m-%d %H:%M:%S")
          echo "\\usepackage{fancyhdr}" > footer.tex
          echo "\\pagestyle{fancy}" >> footer.tex
          echo "\\fancyhf{}" >> footer.tex
          echo "\\renewcommand{\\headrulewidth}{0pt}" >> footer.tex
          echo "\\fancyfoot[L]{\\textcolor[gray]{0.7}{\\tiny Generated on: $GEN_DATE}}" >> footer.tex
          
          pandoc cv.md -o public/cv.pdf \
            --pdf-engine=xelatex \
            -H footer.tex \
            -V mainfont="DejaVu Sans" \
            -V margin-top=20mm \
            -V margin-bottom=20mm \
            -V margin-left=20mm \
            -V margin-right=20mm \
            -V fontsize=11pt \
            -V colorlinks=true \
            -V linkcolor=blue

      - name: Generate HTML
        run: |
          GEN_DATE=$(date +"%Y-%m-%d %H:%M:%S")
          # Add the download link to the markdown before conversion
          echo '<a href="cv.pdf" class="download-btn">Download as PDF</a>' > header.html
          echo "<div class=\"gen-date\">Generated on: $GEN_DATE</div>" >> header.html
          
          pandoc cv.md -o public/index.html \
            --standalone \
            --css style.css \
            --include-before-body header.html

      - name: Copy CSS and .nojekyll to public
        run: |
          cp style.css public/
          cp .nojekyll public/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
